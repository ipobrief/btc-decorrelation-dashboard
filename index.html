<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTC 비상관 알트코인 대시보드</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e17; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
.header { padding: 20px 30px; border-bottom: 1px solid #1a2035; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.header h1 { font-size: 20px; color: #fff; }
.header h1 span { color: #f7931a; }
.controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #8892a4; }
.controls select, .controls input { background: #141a2a; border: 1px solid #2a3450; color: #e0e0e0; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
.controls button { background: #2563eb; color: #fff; border: none; padding: 8px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; }
.controls button:hover { background: #1d4ed8; }
.controls button:disabled { background: #333; cursor: not-allowed; }
.status-bar { padding: 10px 30px; font-size: 13px; color: #8892a4; background: #0d1220; border-bottom: 1px solid #1a2035; }
.progress-wrap { height: 3px; background: #1a2035; margin-top: 6px; border-radius: 2px; overflow: hidden; }
.progress-bar { height: 100%; background: #2563eb; width: 0%; transition: width 0.3s; }
.summary { padding: 16px 30px; display: flex; gap: 20px; flex-wrap: wrap; font-size: 13px; }
.summary .stat { background: #141a2a; padding: 10px 16px; border-radius: 8px; border: 1px solid #1e2a40; }
.summary .stat .val { font-size: 20px; font-weight: 700; color: #fff; }
.summary .stat .lbl { color: #8892a4; margin-top: 2px; }
.coin-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(420px, 1fr)); gap: 16px; padding: 20px 30px; }
.coin-card { background: #111827; border: 1px solid #1e2a40; border-radius: 10px; padding: 16px; }
.coin-card.highlight { border-color: #f59e0b; }
.coin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.coin-name { font-size: 16px; font-weight: 700; color: #fff; }
.coin-name small { font-weight: 400; color: #8892a4; margin-left: 6px; }
.coin-badges { display: flex; gap: 6px; }
.badge { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
.badge.corr { background: #1e3a5f; color: #60a5fa; }
.badge.vol-up { background: #14532d; color: #4ade80; }
.badge.vol-down { background: #451a1a; color: #f87171; }
.badge.vol-spike { background: #7c2d12; color: #fb923c; animation: pulse 1.5s infinite; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
.coin-card.vol-spike { border-color: #f97316; box-shadow: 0 0 12px rgba(249,115,22,0.3); }
.coin-stats { display: flex; gap: 16px; font-size: 12px; color: #8892a4; margin-bottom: 8px; flex-wrap: wrap; }
.coin-stats span { display: flex; flex-direction: column; }
.coin-stats .v { color: #e0e0e0; font-weight: 600; }
.chart-wrap { height: 180px; position: relative; }
.no-results { text-align: center; padding: 60px 30px; color: #8892a4; font-size: 15px; }
.table-view { padding: 0 30px 30px; overflow-x: auto; }
.table-view table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table-view th { text-align: left; padding: 10px 12px; color: #8892a4; border-bottom: 1px solid #1e2a40; cursor: pointer; user-select: none; }
.table-view th:hover { color: #fff; }
.table-view td { padding: 10px 12px; border-bottom: 1px solid #111827; }
.table-view tr:hover td { background: #141a2a; }
.pos { color: #4ade80; } .neg { color: #f87171; }
.view-toggle { display: flex; gap: 4px; }
.view-toggle button { background: #141a2a; border: 1px solid #2a3450; color: #8892a4; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
.view-toggle button.active { background: #2563eb; color: #fff; border-color: #2563eb; }
</style>
</head>
<body>
<div class="header">
  <h1><span>₿</span> BTC 비상관 알트코인 스캐너</h1>
  <div class="controls">
    <label>기간</label>
    <select id="period">
      <option value="7">7일</option>
      <option value="14">14일</option>
      <option value="30" selected>30일</option>
      <option value="90">90일</option>
    </select>
    <label>상관계수 ≤</label>
    <input type="number" id="corrThreshold" value="0.4" min="-1" max="1" step="0.05" style="width:70px">
    <label>최소 거래대금(M$)</label>
    <input type="number" id="minVolume" value="5" min="0" step="1" style="width:70px">
    <label>거래량 급등 ≥</label>
    <input type="number" id="volSpikeThreshold" value="200" min="50" step="50" style="width:70px">
    <label>%</label>
    <div class="view-toggle">
      <button class="active" onclick="setView('card')">카드</button>
      <button onclick="setView('table')">테이블</button>
    </div>
    <button id="scanBtn" onclick="startScan()">스캔 시작</button>
  </div>
</div>
<div class="status-bar">
  <span id="statusText">스캔 버튼을 눌러 시작하세요</span>
  <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>
</div>
<div class="summary" id="summaryArea"></div>
<div class="coin-grid" id="cardView"></div>
<div class="table-view" id="tableView" style="display:none"></div>
<script>
const BINANCE_API='https://api.binance.com/api/v3';let currentView='card';let results=[];let chartInstances={};function setView(v){currentView=v;document.querySelectorAll('.view-toggle button').forEach(b=>b.classList.remove('active'));document.querySelector('.view-toggle button:nth-child('+(v==='card'?1:2)+')').classList.add('active');document.getElementById('cardView').style.display=v==='card'?'grid':'none';document.getElementById('tableView').style.display=v==='table'?'block':'none';if(results.length)renderResults(results)}async function fetchJSON(url){const r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);return r.json()}function pearsonCorrelation(x,y){const n=Math.min(x.length,y.length);if(n<5)return null;const xs=x.slice(-n),ys=y.slice(-n);const mx=xs.reduce((a,b)=>a+b,0)/n;const my=ys.reduce((a,b)=>a+b,0)/n;let num=0,dx2=0,dy2=0;for(let i=0;i<n;i++){const dx=xs[i]-mx,dy=ys[i]-my;num+=dx*dy;dx2+=dx*dx;dy2+=dy*dy}const den=Math.sqrt(dx2*dy2);return den===0?0:num/den}function toReturns(prices){const r=[];for(let i=1;i<prices.length;i++)r.push((prices[i]-prices[i-1])/prices[i-1]);return r}async function getKlines(symbol,interval,limit){const data=await fetchJSON(BINANCE_API+'/klines?symbol='+symbol+'&interval='+interval+'&limit='+limit);return data.map(k=>({time:k[0],open:+k[1],high:+k[2],low:+k[3],close:+k[4],volume:+k[5],quoteVol:+k[7]}))}async function getUSDTSymbols(){const info=await fetchJSON(BINANCE_API+'/exchangeInfo');return info.symbols.filter(s=>{const b=s.baseAsset;const stables=['USDC','BUSD','DAI','TUSD','USDP','FDUSD','PYUSD','EUR','GBP','AEUR','EURI','USD1','XUSD','USDD','FRAX','LUSD','GUSD','SUSD','CUSD','BIDR','IDRT','UAH','BRL','TRY','ARS','PLN','RON','ZAR','NGN','BFUSD','RLUSD','USDE','UST','USDJ','USDK','USDX','ZUSD','HUSD','USDS','USDG','PAXG','XAUT','U'];return s.quoteAsset==='USDT'&&s.status==='TRADING'&&!b.endsWith('UP')&&!b.endsWith('DOWN')&&!b.endsWith('BEAR')&&!b.endsWith('BULL')&&!stables.includes(b)}).map(s=>({symbol:s.symbol,base:s.baseAsset}))}async function startScan(){const btn=document.getElementById('scanBtn');btn.disabled=true;btn.textContent='스캔 중...';const statusEl=document.getElementById('statusText');const progressEl=document.getElementById('progressBar');const period=+document.getElementById('period').value;const corrThreshold=+document.getElementById('corrThreshold').value;const minVol=+document.getElementById('minVolume').value*1e6;const volSpikeThreshold=+document.getElementById('volSpikeThreshold').value;try{statusEl.textContent='거래 가능 심볼 로딩 중...';const allSymbols=await getUSDTSymbols();statusEl.textContent='BTC 데이터 로딩 중...';const btcKlines=await getKlines('BTCUSDT','1d',period+1);const btcReturns=toReturns(btcKlines.map(k=>k.close));statusEl.textContent='24시간 거래량으로 사전 필터링 중...';const tickers=await fetchJSON(BINANCE_API+'/ticker/24hr');const tickerMap={};tickers.forEach(t=>{tickerMap[t.symbol]=+t.quoteVolume});const candidates=allSymbols.filter(s=>s.symbol!=='BTCUSDT'&&(tickerMap[s.symbol]||0)>=minVol);statusEl.textContent=candidates.length+'개 후보 코인 분석 중...';results=[];const batchSize=5;for(let i=0;i<candidates.length;i+=batchSize){const batch=candidates.slice(i,i+batchSize);const promises=batch.map(async(s)=>{try{const klines=await getKlines(s.symbol,'1d',period+1);if(klines.length<10)return null;const returns=toReturns(klines.map(k=>k.close));const corr=pearsonCorrelation(btcReturns,returns);if(corr===null||Math.abs(corr)>corrThreshold)return null;const lastPrice=klines[klines.length-1].close;const firstPrice=klines[0].close;const chgPct=((lastPrice-firstPrice)/firstPrice)*100;const vols=klines.map(k=>k.volume);const recent3=vols.slice(-3);const prev10=vols.slice(-13,-3);const avg3=recent3.reduce((a,b)=>a+b,0)/recent3.length;const avg10=prev10.length>=3?prev10.reduce((a,b)=>a+b,0)/prev10.length:0;const volSpikePct=avg10>0?((avg3-avg10)/avg10)*100:0;const hasVolSpike=volSpikePct>=volSpikeThreshold;const vol24h=tickerMap[s.symbol]||0;return{symbol:s.symbol,base:s.base,corr,klines,lastPrice,chgPct,vol24h,avg3Vol:avg3,avg10Vol:avg10,volSpikePct,hasVolSpike}}catch{return null}});const batchResults=await Promise.all(promises);batchResults.forEach(r=>{if(r)results.push(r)});progressEl.style.width=Math.min(100,((i+batchSize)/candidates.length*100)).toFixed(0)+'%';statusEl.textContent='분석 중... '+Math.min(i+batchSize,candidates.length)+'/'+candidates.length+' (발견: '+results.length+'개)'}results.sort((a,b)=>{if(a.hasVolSpike!==b.hasVolSpike)return b.hasVolSpike-a.hasVolSpike;if(a.hasVolSpike&&b.hasVolSpike)return b.volSpikePct-a.volSpikePct;return Math.abs(a.corr)-Math.abs(b.corr)});renderSummary(results,candidates.length);renderResults(results);statusEl.textContent='완료! '+candidates.length+'개 중 '+results.length+'개 비상관 코인 발견'}catch(e){statusEl.textContent='에러: '+e.message}btn.disabled=false;btn.textContent='스캔 시작'}function renderSummary(res,total){const area=document.getElementById('summaryArea');const negCorr=res.filter(r=>r.corr<0).length;const spikeCount=res.filter(r=>r.hasVolSpike).length;const avgCorr=res.length?(res.reduce((a,r)=>a+r.corr,0)/res.length).toFixed(3):'-';area.innerHTML='<div class="stat"><div class="val">'+total+'</div><div class="lbl">분석 코인</div></div><div class="stat"><div class="val">'+res.length+'</div><div class="lbl">비상관 코인</div></div><div class="stat"><div class="val">'+negCorr+'</div><div class="lbl">역상관 코인</div></div><div class="stat"><div class="val" style="color:#fb923c">'+spikeCount+'</div><div class="lbl">🔥 거래량 급등</div></div><div class="stat"><div class="val">'+avgCorr+'</div><div class="lbl">평균 상관계수</div></div>'}function fmtNum(n,d){d=d||2;if(Math.abs(n)>=1e9)return(n/1e9).toFixed(d)+'B';if(Math.abs(n)>=1e6)return(n/1e6).toFixed(d)+'M';if(Math.abs(n)>=1e3)return(n/1e3).toFixed(d)+'K';return n.toFixed(d)}function renderResults(res){if(currentView==='card')renderCards(res);else renderTable(res)}function renderCards(res){const grid=document.getElementById('cardView');Object.values(chartInstances).forEach(c=>c.destroy());chartInstances={};if(!res.length){grid.innerHTML='<div class="no-results">조건에 맞는 코인이 없습니다.</div>';return}grid.innerHTML=res.map((r,i)=>'<div class="coin-card'+(r.corr<0?' highlight':'')+(r.hasVolSpike?' vol-spike':'')+'"><div class="coin-header"><div class="coin-name">'+r.base+'<small>/USDT</small></div><div class="coin-badges"><span class="badge corr">ρ = '+r.corr.toFixed(3)+'</span>'+(r.hasVolSpike?'<span class="badge vol-spike">🔥 거래량 +'+r.volSpikePct.toFixed(0)+'%</span>':'<span class="badge '+(r.volSpikePct>=0?'vol-up':'vol-down')+'">거래량 '+(r.volSpikePct>=0?'+':'')+r.volSpikePct.toFixed(0)+'%</span>')+'</div></div><div class="coin-stats"><span>가격 <span class="v">$'+(r.lastPrice<1?r.lastPrice.toPrecision(4):fmtNum(r.lastPrice))+'</span></span><span>'+(r.chgPct>=0?'기간 수익':'기간 손실')+' <span class="v '+(r.chgPct>=0?'pos':'neg')+'">'+(r.chgPct>=0?'+':'')+r.chgPct.toFixed(1)+'%</span></span><span>3일 평균 거래량 <span class="v">'+fmtNum(r.avg3Vol)+'</span></span><span>10일 평균 거래량 <span class="v">'+fmtNum(r.avg10Vol)+'</span></span></div><div class="chart-wrap" style="cursor:pointer" onclick="window.open(\x27https://www.tradingview.com/chart/AGxW3D6C/?symbol=BINANCE:'+r.base+'USDT\x27,\x27_blank\x27)"><canvas id="chart_'+i+'"></canvas></div></div>').join('');res.forEach((r,i)=>{const ctx=document.getElementById('chart_'+i).getContext('2d');const labels=r.klines.map(k=>new Date(k.time).toLocaleDateString('ko',{month:'numeric',day:'numeric'}));chartInstances[i]=new Chart(ctx,{type:'line',data:{labels,datasets:[{label:'가격',data:r.klines.map(k=>k.close),borderColor:r.chgPct>=0?'#4ade80':'#f87171',backgroundColor:(r.chgPct>=0?'rgba(74,222,128,':'rgba(248,113,113,')+'0.08)',fill:true,tension:0.3,pointRadius:0,borderWidth:1.5,yAxisID:'y'},{label:'거래량',data:r.klines.map(k=>k.volume),type:'bar',backgroundColor:'rgba(59,130,246,0.25)',borderColor:'rgba(59,130,246,0.4)',borderWidth:1,yAxisID:'y1'}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#555',maxTicksLimit:8,font:{size:10}},grid:{color:'#1a2035'}},y:{position:'left',ticks:{color:'#555',font:{size:10},callback:v=>'$'+fmtNum(v)},grid:{color:'#1a2035'}},y1:{position:'right',ticks:{display:false},grid:{display:false}}}}})})}function renderTable(res){const div=document.getElementById('tableView');if(!res.length){div.innerHTML='<div class="no-results">조건에 맞는 코인이 없습니다.</div>';return}div.innerHTML='<table><thead><tr><th onclick="sortTable(\x27base\x27)">코인</th><th onclick="sortTable(\x27corr\x27)">상관계수</th><th onclick="sortTable(\x27lastPrice\x27)">가격</th><th onclick="sortTable(\x27chgPct\x27)">기간 변동</th><th onclick="sortTable(\x27avg3Vol\x27)">3일 평균 거래량</th><th onclick="sortTable(\x27avg10Vol\x27)">10일 평균 거래량</th><th onclick="sortTable(\x27volSpikePct\x27)">급등률</th></tr></thead><tbody>'+res.map(r=>'<tr'+(r.hasVolSpike?' style="background:#1a1000"':'')+'><td><a href="https://www.tradingview.com/chart/AGxW3D6C/?symbol=BINANCE:'+r.base+'USDT" target="_blank" style="color:#60a5fa;text-decoration:none"><strong>'+r.base+'</strong>/USDT</a> '+(r.hasVolSpike?'🔥':'')+'</td><td class="'+(r.corr<0?'neg':'')+'">'+r.corr.toFixed(3)+'</td><td>$'+(r.lastPrice<1?r.lastPrice.toPrecision(4):fmtNum(r.lastPrice))+'</td><td class="'+(r.chgPct>=0?'pos':'neg')+'">'+(r.chgPct>=0?'+':'')+r.chgPct.toFixed(1)+'%</td><td>'+fmtNum(r.avg3Vol)+'</td><td>'+fmtNum(r.avg10Vol)+'</td><td class="'+(r.volSpikePct>=200?'pos':r.volSpikePct>=0?'':'neg')+'" style="'+(r.hasVolSpike?'font-weight:700':'')+'">'+(r.volSpikePct>=0?'+':'')+r.volSpikePct.toFixed(0)+'%</td></tr>').join('')+'</tbody></table>'}let sortKey='corr',sortAsc=true;function sortTable(key){if(sortKey===key)sortAsc=!sortAsc;else{sortKey=key;sortAsc=true}results.sort((a,b)=>{const va=a[key],vb=b[key];return sortAsc?(va>vb?1:-1):(va<vb?1:-1)});renderTable(results)}
</script>
</body>
</html>
